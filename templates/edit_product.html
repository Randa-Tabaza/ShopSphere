{% extends "base.html" %}

{% block content %}

<h1>Edit Product</h1>

<form method="POST">

    <input
        type="text"
        name="name"
        value="{{ product.name }}"
        required
    >

    <textarea
        name="description"
    >{{ product.description }}</textarea>

    <input
        type="text"
        name="category"
        value="{{ product.category }}"
        required
    >

    <input
        type="number"
        step="0.01"
        name="price"
        value="{{ product.price }}"
        required
    >

    <input
        type="number"
        name="stock"
        value="{{ product.stock }}"
        required
    >

    <input
        type="text"
        name="image_url"
        value="{{ product.image_url }}"
    >

    <button type="submit">
        Save Changes
    </button>

</form>

<a class="back-link" href="/">
    ← Back
</a>

{% endblock %}
