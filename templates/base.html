<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShopSphere</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:"Segoe UI",sans-serif;
            background:#0f172a;
            color:#f8fafc;
            min-height:100vh;
        }

        .navbar{
            background:#111827;
            padding:20px 40px;
            border-bottom:1px solid #1e293b;
        }

        .logo{
            font-size:2rem;
            font-weight:bold;
            color:#3b82f6;
        }

        .subtitle{
            color:#94a3b8;
            margin-top:5px;
        }

        .container{
            width:90%;
            max-width:1400px;
            margin:auto;
            padding:30px 0;
        }

        .hero{
            background:
            linear-gradient(
                135deg,
                #1e293b,
                #0f172a
            );

            padding:60px;
            border-radius:20px;
            text-align:center;
            margin-bottom:30px;
        }

        .hero h1{
            font-size:3rem;
            margin-bottom:15px;
        }

        .hero p{
            color:#94a3b8;
            font-size:1.1rem;
        }

        form{
            background:#1e293b;
            padding:25px;
            border-radius:16px;
            margin-bottom:30px;
        }

        input,
        textarea,
        select{
            width:100%;
            padding:12px;
            margin-top:10px;
            margin-bottom:15px;
            border:none;
            border-radius:10px;
            background:#0f172a;
            color:white;
        }

        button{
            background:#3b82f6;
            color:white;
            border:none;
            padding:12px 20px;
            border-radius:10px;
            cursor:pointer;
            transition:.3s;
        }

        button:hover{
            background:#2563eb;
        }

        .stats-grid{
            display:grid;
            grid-template-columns:repeat(2,1fr);
            gap:20px;
            margin-bottom:30px;
        }

        .stat-card{
            background:#1e293b;
            padding:25px;
            border-radius:16px;
            text-align:center;
        }

        .stat-card h3{
            font-size:2rem;
            color:#3b82f6;
        }

        .featured-banner{
            background:
            linear-gradient(
                135deg,
                #2563eb,
                #3b82f6
            );

            padding:25px;
            border-radius:18px;
            margin:25px 0;
        }

        .featured-banner h3{
            margin-bottom:10px;
        }

        .category-btn{
            display:inline-block;
            padding:10px 16px;
            background:#1e293b;
            color:white;
            text-decoration:none;
            border-radius:10px;
            margin:5px;
            transition:.3s;
        }
        .active-category{
            background:#3b82f6 !important;
            color:white !important;
            border-color:#3b82f6 !important;

            box-shadow:
                0 0 15px rgba(59,130,246,.4);
        }

        .category-btn:hover{
            background:#3b82f6;
        }

        .products-grid{
            display:grid;
            grid-template-columns:
            repeat(auto-fit,minmax(280px,1fr));

            gap:25px;
            margin-top:25px;
        }

        .product-card{
            background:#1e293b;
            border-radius:18px;
            overflow:hidden;
            transition:.3s;
        }

        .product-card:hover{
            transform:translateY(-8px);
            box-shadow:
            0 20px 40px rgba(0,0,0,.45);
        }

        .card-link{
            display:block;
            text-decoration:none;
            color:inherit;
        }

        .product-image{
            width:100%;
            height:250px;
            object-fit:cover;
        }

        .product-content{
            padding:20px;
        }

        .product-title{
            font-size:1.2rem;
            font-weight:bold;
            color:white;
            margin-bottom:10px;
        }

        .price{
            color:#3b82f6;
            font-size:1.3rem;
            font-weight:bold;
            margin-top:10px;
        }

        .action-links{
            padding:0 20px 20px;
        }

        .action-btn{
            display:inline-block;
            padding:10px 16px;
            border-radius:10px;
            text-decoration:none;
            font-weight:600;
            margin-right:8px;
            transition:.3s;
        }

        .edit-btn{
            background:#334155;
            color:#f8fafc;
            border:1px solid #475569;
        }

        .edit-btn:hover{
            background:#475569;
        }

        .delete-btn{
            background:#1e293b;
            color:#ef4444;
            border:1px solid #ef4444;
        }

        .delete-btn:hover{
            background:#ef4444;
            color:white;
        }

        .product-details{
            display:grid;
            grid-template-columns:1fr 1fr;
            gap:40px;
            align-items:start;
        }

        .product-details img{
            width:100%;
            border-radius:20px;
        }

        .review-card{
            background:#1e293b;
            padding:20px;
            border-radius:15px;
            margin-top:15px;
        }

        .back-link{
            color:#3b82f6;
            text-decoration:none;
        }

        .footer{
            margin-top:60px;
            padding:30px;
            text-align:center;
            color:#94a3b8;
            border-top:1px solid #1e293b;
        }
        .badge-row{
            margin-top:10px;
        }

        .category-badge{
            background:#2563eb;
            color:white;
            padding:5px 10px;
            border-radius:999px;
            font-size:.8rem;
        }

        .stock-badge{
            padding:5px 10px;
            border-radius:999px;
            font-size:.8rem;
            margin-left:5px;
        }

        .stock-good{
            background:#16a34a;
        }

        .stock-low{
            background:#f59e0b;
        }

        .stock-out{
            background:#dc2626;
        }

        @media(max-width:768px){

            .hero{
                padding:35px;
            }

            .hero h1{
                font-size:2rem;
            }

            .stats-grid{
                grid-template-columns:1fr;
            }

            .product-details{
                grid-template-columns:1fr;
            }

        }

        .modal{
            display:none;

            position:fixed;

            top:0;
            left:0;

            width:100%;
            height:100%;

            z-index:999;

            background:
                rgba(0,0,0,.75);

            backdrop-filter:blur(6px);

            overflow-y:auto;
        }

        .modal-content{
            background:#1e293b;
            width:90%;
            max-width:800px;

            margin:40px auto;

            padding:30px;

            border-radius:20px;

            max-height:90vh;
            overflow-y:auto;
        }

        .close-modal{
            float:right;

            font-size:32px;

            color:#94a3b8;

            cursor:pointer;

            transition:.3s;
        }

        .close-modal:hover{
            color:white;
        }
        .add-product-btn{
            margin-bottom:30px;
        }
        .add-product-btn{
            background:#2563eb;
            color:white;
            padding:14px 24px;
            border:none;
            border-radius:12px;
            font-weight:600;
            font-size:1rem;
            margin-bottom:35px;
            cursor:pointer;
            transition:.3s;
        }

        .add-product-btn:hover{
            transform:translateY(-2px);
            box-shadow:
                0 10px 20px rgba(37,99,235,.35);
        }
        #searchInput{
            width:100%;
            max-width:700px;

            display:block;
            margin:20px auto 30px auto;

            padding:16px 20px;

            background:#1e293b;

            border:2px solid #334155;

            border-radius:14px;

            color:white;

            font-size:1rem;

            transition:.3s;
        }

        #searchInput::placeholder{
            color:#94a3b8;
        }

        #searchInput:focus{
            outline:none;

            border-color:#3b82f6;

            box-shadow:
                0 0 0 4px rgba(59,130,246,.2);
        }
        .search-container{
            display:flex;
            justify-content:center;
            margin:30px 0;
        }

    </style>

</head>

<body>

    <div class="navbar">

        <div class="logo">
            ShopSphere
        </div>

        <div class="subtitle">
            Your Ultimate E-commerce Hub
        </div>

    </div>

    <div class="container">

        {% block content %}
        {% endblock %}

    </div>

    <footer class="footer">

        <h3>ShopSphere</h3>

        <p>
            Copyright &copy; 2024 ShopSphere. All rights reserved.
        </p>

    </footer>

</body>
</html>
